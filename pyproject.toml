[tool.ruff]
line-length = 120
exclude = ["migrations", ".venv", "node_modules"]

[tool.pytest.ini_options]
addopts = [
    "--ignore-glob=**/test_*_exercise.py",
    "--ignore-glob=**/test_*_common.py",
    "--ignore-glob=**/template/**",
    "--import-mode=importlib",
]
pythonpath = ["python", "python/01-hello-world", "python/02-variables", "python/03-casting", "python/template"]
